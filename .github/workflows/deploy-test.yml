name: Deploy to Test

on:
  workflow_dispatch:
    inputs:
      deploy_backend:
        description: 'Deploy backend'
        required: true
        default: true
        type: boolean
      deploy_frontend:
        description: 'Deploy frontend'
        required: true
        default: true
        type: boolean

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '22.x'
  DEPLOY_PATH: '/opt/11of'

jobs:
  build-backend:
    name: Build Backend
    runs-on: self-hosted
    environment: test.11onfield.com
    if: github.event.inputs.deploy_backend == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('backoffice/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build with Maven
        working-directory: ./backoffice
        run: mvn clean package -DskipTests -B -s .mvn/settings.xml

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backoffice/target/backoffice-0.0.1-SNAPSHOT.jar
          retention-days: 7

  build-frontend:
    name: Build Frontend
    runs-on: self-hosted
    environment: test.11onfield.com
    if: github.event.inputs.deploy_frontend == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('frontend-app/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        working-directory: ./frontend-app
        run: npm ci

      - name: Create production environment file
        working-directory: ./frontend-app
        run: |
          echo "NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}" > .env.production

      - name: Build application
        working-directory: ./frontend-app
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: |
            frontend-app/.next
            frontend-app/package.json
            frontend-app/package-lock.json
            frontend-app/.npmrc
            frontend-app/next.config.js
            frontend-app/public
          retention-days: 7

  deploy-backend:
    name: Deploy Backend
    runs-on: self-hosted
    needs: build-backend
    environment: test.11onfield.com
    if: ${{ !cancelled() && needs.build-backend.result == 'success' }}

    steps:
      - name: Checkout deployment scripts
        uses: actions/checkout@v4
        with:
          sparse-checkout: deployment/scripts
          sparse-checkout-cone-mode: false

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: /tmp/artifacts/backend

      - name: Create backend environment file
        run: |
          sudo -u 11of-app tee ${{ env.DEPLOY_PATH }}/backend/.env > /dev/null << 'EOF'
          DB_USERNAME=${{ secrets.DB_USERNAME }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          JWT_ISSUER_URI=${{ secrets.JWT_ISSUER_URI }}
          JWT_JWK_SET_URI=${{ secrets.JWT_JWK_SET_URI }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION=${{ secrets.AWS_REGION }}
          AWS_S3_BUCKET=${{ secrets.AWS_S3_BUCKET }}
          FRONTEND_URL=${{ secrets.FRONTEND_URL }}
          SPRING_PROFILES_ACTIVE=prod
          EOF
          sudo chmod 640 ${{ env.DEPLOY_PATH }}/backend/.env

      - name: Deploy backend
        run: |
          sudo -u 11of-app bash ${{ env.DEPLOY_PATH }}/scripts/deploy-backend.sh \
            /tmp/artifacts/backend/backoffice-0.0.1-SNAPSHOT.jar

      - name: Wait for backend startup
        run: sleep 10

  deploy-frontend:
    name: Deploy Frontend
    runs-on: self-hosted
    needs: [build-frontend, deploy-backend]
    environment: test.11onfield.com
    if: ${{ !cancelled() && needs.build-frontend.result == 'success' }}

    steps:
      - name: Checkout deployment scripts
        uses: actions/checkout@v4
        with:
          sparse-checkout: deployment/scripts
          sparse-checkout-cone-mode: false

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: /tmp/artifacts/frontend

      - name: Update production dependencies if needed
        run: |
          cd ${{ env.DEPLOY_PATH }}/frontend
          if [ ! -d "node_modules" ] || [ package.json -nt node_modules ]; then
            sudo -u 11of-app npm ci --production --prefix .
          fi

      - name: Create frontend environment file
        run: |
          sudo -u 11of-app tee ${{ env.DEPLOY_PATH }}/frontend/.env.production > /dev/null << 'EOF'
          NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          EOF
          sudo chmod 640 ${{ env.DEPLOY_PATH }}/frontend/.env.production

      - name: Deploy frontend
        run: |
          sudo -u 11of-app bash ${{ env.DEPLOY_PATH }}/scripts/deploy-frontend.sh \
            /tmp/artifacts/frontend

      - name: Wait for frontend startup
        run: sleep 10

  health-check:
    name: Health Check
    runs-on: self-hosted
    needs: [deploy-backend, deploy-frontend]
    environment: test.11onfield.com
    if: ${{ !cancelled() && (needs.deploy-backend.result == 'success' || needs.deploy-frontend.result == 'success') }}

    steps:
      - name: Run comprehensive health check
        run: |
          bash ${{ env.DEPLOY_PATH }}/scripts/health-check.sh

      - name: Notify deployment success
        if: success()
        run: |
          echo "✅ Deployment completed successfully!"
          echo "Backend: http://localhost:8081"
          echo "Frontend: http://localhost:8080"
          echo "Deployed commit: ${{ github.sha }}"

  rollback:
    name: Rollback on Failure
    runs-on: self-hosted
    needs: [deploy-backend, deploy-frontend, health-check]
    if: failure()

    steps:
      - name: Rollback backend
        if: needs.deploy-backend.result == 'failure' || needs.health-check.result == 'failure'
        run: |
          sudo -u 11of-app bash ${{ env.DEPLOY_PATH }}/scripts/rollback.sh backend
        continue-on-error: true

      - name: Rollback frontend
        if: needs.deploy-frontend.result == 'failure' || needs.health-check.result == 'failure'
        run: |
          sudo -u 11of-app bash ${{ env.DEPLOY_PATH }}/scripts/rollback.sh frontend
        continue-on-error: true

      - name: Notify deployment failure
        run: |
          echo "❌ Deployment failed and rolled back to previous version"
          echo "Failed commit: ${{ github.sha }}"
          exit 1
