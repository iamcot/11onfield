# 11onfield.com nginx configuration

upstream frontend {
    server 127.0.0.1:8080;
}

upstream backend {
    server 127.0.0.1:8081;
}

# Redirect HTTP to HTTPS (uncomment when SSL is configured)
# server {
#     listen 80;
#     listen [::]:80;
#     server_name 11onfield.com www.11onfield.com;
#     return 301 https://$server_name$request_uri;
# }

# Main server block
server {
    listen 80;
    listen [::]:80;
    server_name 11onfield.com www.11onfield.com;

    # For SSL/HTTPS (uncomment and configure when ready)
    # listen 443 ssl http2;
    # listen [::]:443 ssl http2;
    # ssl_certificate /etc/letsencrypt/live/11onfield.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/11onfield.com/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;

    # Max upload size - must match or exceed backend limit (20MB)
    client_max_body_size 25M;

    # Logging
    access_log /var/log/nginx/11onfield_access.log;
    error_log /var/log/nginx/11onfield_error.log;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # API backend proxy
    location /api/ {
        proxy_pass http://backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Redirect /admin to /admin/
    location = /admin {
        return 301 /admin/;
    }

    # Backend admin panel (Thymeleaf templates)
    location /admin/ {
        proxy_pass http://backend/admin/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;

        # Session cookie support
        proxy_cookie_path / /;
    }

    # Admin static resources (CSS, JS, images)
    location /admin/css/ {
        proxy_pass http://backend/admin/css/;
        expires 1d;
        add_header Cache-Control "public";
    }

    location /admin/js/ {
        proxy_pass http://backend/admin/js/;
        expires 1d;
        add_header Cache-Control "public";
    }

    location /admin/img/ {
        proxy_pass http://backend/admin/img/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Backend static resources (CSS, JS for admin panel)
    location /css/ {
        proxy_pass http://backend/css/;
        expires 1d;
    }

    location /js/ {
        proxy_pass http://backend/js/;
        expires 1d;
    }

    location /images/ {
        proxy_pass http://backend/images/;
        expires 7d;
    }

    # Backend actuator endpoints (optional, restrict in production)
    location /actuator/ {
        proxy_pass http://backend/actuator/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Restrict access to localhost only (recommended)
        allow 127.0.0.1;
        deny all;
    }

    # Frontend application
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Next.js specific settings
        proxy_buffering off;
    }

    # Next.js specific paths
    location /_next/static/ {
        proxy_pass http://frontend/_next/static/;
        proxy_cache_valid 200 60m;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Favicon and static assets
    location ~* \.(ico|css|js|gif|jpeg|jpg|png|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://frontend;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
