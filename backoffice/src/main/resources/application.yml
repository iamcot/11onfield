spring:
  application:
    name: backoffice

  datasource:
    url: jdbc:mysql://localhost:3306/elevenof_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:http://localhost:8080}
          jwk-set-uri: ${JWT_JWK_SET_URI:http://localhost:8080/.well-known/jwks.json}

  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML

  servlet:
    multipart:
      enabled: true
      max-file-size: 20MB
      max-request-size: 20MB
      file-size-threshold: 2MB

server:
  port: ${SERVER_PORT:8081}

jwt:
  secret: ${JWT_SECRET:your-secret-key-must-be-at-least-256-bits-long-for-hs512-algorithm-security}
  expiration: 86400 # 24 hours in seconds

aws:
  s3:
    accessKey: ${AWS_ACCESS_KEY_ID:your-access-key}
    secretKey: ${AWS_SECRET_ACCESS_KEY:your-secret-key}
    region: ${AWS_REGION:ap-southeast-1}
    bucketName: ${AWS_S3_BUCKET:11of}
    avatarFolder: avatars/
    eventImageFolder: events/

app:
  frontend:
    url: ${FRONTEND_URL:http://localhost}

logging:
  level:
    com.elevenof.backoffice: DEBUG
    org.springframework.security: DEBUG
