<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Hexagon Chart Fragment</title>
</head>
<body>
  <!-- Hexagon Chart Fragment (Small - for table) -->
  <div th:fragment="hexagon-chart(playerId, playerName, attributes, attributesMap)">
    <svg
      th:id="'hexagon-' + ${playerId}"
      width="80"
      height="80"
      viewBox="0 0 80 80"
      style="display: block; cursor: pointer;"
      th:onclick="|showHexagonModal(${playerId})|">
      <style>
        .hex-bg { fill: #f0f0f0; stroke: #ddd; stroke-width: 1; }
        .hex-data { fill: rgba(40, 167, 69, 0.3); stroke: #28a745; stroke-width: 2; }
        .hex-axis { stroke: #e0e0e0; stroke-width: 0.5; }
      </style>

      <!-- Background hexagon -->
      <polygon class="hex-bg" points="40,5 65,20 65,50 40,65 15,50 15,20" />

      <!-- Axis lines -->
      <line class="hex-axis" x1="40" y1="35" x2="40" y2="5" />
      <line class="hex-axis" x1="40" y1="35" x2="65" y2="20" />
      <line class="hex-axis" x1="40" y1="35" x2="65" y2="50" />
      <line class="hex-axis" x1="40" y1="35" x2="40" y2="65" />
      <line class="hex-axis" x1="40" y1="35" x2="15" y2="50" />
      <line class="hex-axis" x1="40" y1="35" x2="15" y2="20" />

      <!-- Data polygon -->
      <polygon class="hex-data" th:if="${attributesMap != null and !#maps.isEmpty(attributesMap)}"
        th:with="
          attr1=${#lists.size(attributes) > 0 ? attributes[0].attributeKey : 'attr1'},
          attr2=${#lists.size(attributes) > 1 ? attributes[1].attributeKey : 'attr2'},
          attr3=${#lists.size(attributes) > 2 ? attributes[2].attributeKey : 'attr3'},
          attr4=${#lists.size(attributes) > 3 ? attributes[3].attributeKey : 'attr4'},
          attr5=${#lists.size(attributes) > 4 ? attributes[4].attributeKey : 'attr5'},
          attr6=${#lists.size(attributes) > 5 ? attributes[5].attributeKey : 'attr6'},
          val1=${attributesMap.get(attr1) != null ? attributesMap.get(attr1) : 0},
          val2=${attributesMap.get(attr2) != null ? attributesMap.get(attr2) : 0},
          val3=${attributesMap.get(attr3) != null ? attributesMap.get(attr3) : 0},
          val4=${attributesMap.get(attr4) != null ? attributesMap.get(attr4) : 0},
          val5=${attributesMap.get(attr5) != null ? attributesMap.get(attr5) : 0},
          val6=${attributesMap.get(attr6) != null ? attributesMap.get(attr6) : 0},
          s1=${val1 * 0.3}, s2=${val2 * 0.3}, s3=${val3 * 0.3}, s4=${val4 * 0.3}, s5=${val5 * 0.3}, s6=${val6 * 0.3}
        "
        th:points="${'40,' + (35 - s1) + ' ' + (40 + s2 * 0.866) + ',' + (35 - s2 * 0.5) + ' ' + (40 + s3 * 0.866) + ',' + (35 + s3 * 0.5) + ' 40,' + (35 + s4) + ' ' + (40 - s5 * 0.866) + ',' + (35 + s5 * 0.5) + ' ' + (40 - s6 * 0.866) + ',' + (35 - s6 * 0.5)}"
      />

      <!-- Empty state -->
      <text th:if="${attributesMap == null or #maps.isEmpty(attributesMap)}"
        x="40" y="40" text-anchor="middle" font-size="10" fill="#999">N/A</text>
    </svg>

    <!-- Hidden data for modal -->
    <script th:inline="javascript">
      /*<![CDATA[*/
      window.hexagonData = window.hexagonData || {};
      var playerId = [[${playerId}]];
      window.hexagonData[playerId] = {
        playerId: [[${playerId}]],
        playerName: [[${playerName}]],
        attributes: [[${attributes}]],
        attributesMap: [[${attributesMap}]]
      };
      /*]]>*/
    </script>
  </div>

  <!-- Modal -->
  <div th:fragment="hexagon-modal">
    <div id="hexagonModal" class="modal fade" tabindex="-1" role="dialog">
      <div class="modal-dialog modal-lg" role="document">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="hexagonModalTitle">Chỉ số cầu thủ</h5>
            <button type="button" class="close" data-dismiss="modal" aria-label="Close">
              <span aria-hidden="true">&times;</span>
            </button>
          </div>
          <div class="modal-body">
            <div id="hexagonModalBody" style="text-align: center; padding: 20px;">
              <!-- Chart will be rendered here -->
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      function showHexagonModal(playerId) {
        var data = window.hexagonData[playerId];
        if (!data) {
          alert('Không có dữ liệu chỉ số');
          return;
        }

        // Update modal title
        document.getElementById('hexagonModalTitle').textContent = 'Chỉ số cầu thủ - ' + data.playerName;

        // Render large hexagon chart with labels
        var body = document.getElementById('hexagonModalBody');
        body.innerHTML = renderLargeHexagon(data);

        // Show modal
        $('#hexagonModal').modal('show');
      }

      function renderLargeHexagon(data) {
        var attributes = data.attributes;
        var attributesMap = data.attributesMap;

        if (!attributes || attributes.length === 0) {
          return '<p class="text-muted">Chưa có dữ liệu chỉ số</p>';
        }

        // Get up to 6 attributes
        var attrs = attributes.slice(0, 6);
        var values = attrs.map(function(attr) {
          return attributesMap && attributesMap[attr.attributeKey] ? attributesMap[attr.attributeKey] : 0;
        });

        // Calculate points for hexagon (center at 200, 200, radius 120)
        var cx = 200, cy = 200, radius = 120;
        var angles = [0, 60, 120, 180, 240, 300]; // degrees

        var bgPoints = angles.map(function(angle) {
          var rad = (angle - 90) * Math.PI / 180;
          return (cx + radius * Math.cos(rad)) + ',' + (cy + radius * Math.sin(rad));
        }).join(' ');

        var dataPoints = angles.map(function(angle, i) {
          var value = values[i] || 0;
          var r = (value / 100) * radius;
          var rad = (angle - 90) * Math.PI / 180;
          return (cx + r * Math.cos(rad)) + ',' + (cy + r * Math.sin(rad));
        }).join(' ');

        // Calculate label positions (further out from vertices)
        var labelRadius = radius + 40;
        var labels = angles.map(function(angle, i) {
          var rad = (angle - 90) * Math.PI / 180;
          var x = cx + labelRadius * Math.cos(rad);
          var y = cy + labelRadius * Math.sin(rad);
          var attr = attrs[i];
          var value = values[i];

          return '<text x="' + x + '" y="' + y + '" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">' +
              (attr ? attr.attributeName : 'N/A') +
            '</text>' +
            '<text x="' + x + '" y="' + (y + 15) + '" text-anchor="middle" font-size="14" font-weight="bold" fill="#28a745">' +
              value +
            '</text>';
        }).join('');

        // Generate axis lines
        var axisLines = angles.map(function(angle) {
          var rad = (angle - 90) * Math.PI / 180;
          var x2 = cx + radius * Math.cos(rad);
          var y2 = cy + radius * Math.sin(rad);
          return '<line x1="' + cx + '" y1="' + cy + '" x2="' + x2 + '" y2="' + y2 + '" stroke="#e0e0e0" stroke-width="1" />';
        }).join('');

        var dataPolygon = attributesMap && Object.keys(attributesMap).length > 0 ?
          '<polygon class="hex-data-large" points="' + dataPoints + '" />' :
          '<text x="200" y="200" text-anchor="middle" font-size="16" fill="#999">Chưa có dữ liệu</text>';

        return '<svg width="400" height="400" viewBox="0 0 400 400" style="max-width: 100%;">' +
            '<style>' +
              '.hex-bg-large { fill: #f8f9fa; stroke: #dee2e6; stroke-width: 2; }' +
              '.hex-data-large { fill: rgba(40, 167, 69, 0.3); stroke: #28a745; stroke-width: 3; }' +
            '</style>' +
            '<!-- Axis lines -->' +
            axisLines +
            '<!-- Background hexagon -->' +
            '<polygon class="hex-bg-large" points="' + bgPoints + '" />' +
            '<!-- Data hexagon -->' +
            dataPolygon +
            '<!-- Labels -->' +
            labels +
          '</svg>';
      }
    </script>
  </div>
</body>
</html>
