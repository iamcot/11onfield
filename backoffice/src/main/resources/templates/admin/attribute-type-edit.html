<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{fragments/layout :: layout (${title}, ~{::content})}"
>
  <head>
    <title>Edit Attribute Type</title>
  </head>
  <body>
    <div th:fragment="content">
      <div class="row">
        <div class="col-md-8 offset-md-2">
          <div class="card">
            <div class="card-header">
              <h3 class="card-title">
                <span th:if="${isNew}">Tạo loại chỉ số mới</span>
                <span th:unless="${isNew}">Chỉnh sửa loại chỉ số</span>
              </h3>
            </div>

            <form th:action="@{/admin/attribute-types/save}" method="post">
              <input type="hidden" name="id" th:value="${attributeType?.id}" />

              <div class="card-body">
                <div class="form-group">
                  <label for="attributeKey">
                    Attribute Key <span class="text-danger">*</span>
                    <small class="text-muted">(e.g., "speed", "strength", "passing")</small>
                  </label>
                  <input
                    type="text"
                    class="form-control"
                    id="attributeKey"
                    name="attributeKey"
                    th:value="${attributeType?.attributeKey}"
                    required
                    pattern="[a-z_]+"
                    title="Chỉ được dùng chữ thường và dấu gạch dưới"
                    placeholder="e.g., speed"
                  />
                </div>

                <div class="form-group">
                  <label for="attributeName">
                    Tên hiển thị <span class="text-danger">*</span>
                  </label>
                  <input
                    type="text"
                    class="form-control"
                    id="attributeName"
                    name="attributeName"
                    th:value="${attributeType?.attributeName}"
                    required
                    placeholder="e.g., Tốc độ"
                  />
                </div>

                <div class="form-group">
                  <label for="attributeGroup">Nhóm chỉ số</label>
                  <select class="form-control" id="attributeGroup" name="attributeGroup">
                    <option value="">-- Không chọn --</option>
                    <option value="physical" th:selected="${attributeType?.attributeGroup == 'physical'}">Physical (Thể lực)</option>
                    <option value="technical" th:selected="${attributeType?.attributeGroup == 'technical'}">Technical (Kỹ thuật)</option>
                    <option value="mental" th:selected="${attributeType?.attributeGroup == 'mental'}">Mental (Tinh thần)</option>
                    <option value="tactical" th:selected="${attributeType?.attributeGroup == 'tactical'}">Tactical (Chiến thuật)</option>
                    <option value="goalkeeper" th:selected="${attributeType?.attributeGroup == 'goalkeeper'}">Goalkeeper (Thủ môn)</option>
                  </select>
                </div>

                <div class="form-check mb-3">
                  <input
                    type="checkbox"
                    class="form-check-input"
                    id="isHexagon"
                    name="isHexagon"
                    th:checked="${attributeType == null || attributeType.isHexagon}"
                  />
                  <label class="form-check-label" for="isHexagon">
                    Hiển thị trên biểu đồ hexagon
                    <small class="text-muted">(Chỉ số này sẽ hiển thị trên biểu đồ 6 cạnh của cầu thủ)</small>
                  </label>
                </div>

                <div class="form-check mb-3">
                  <input
                    type="checkbox"
                    class="form-check-input"
                    id="isGoalKeeper"
                    name="isGoalKeeper"
                    th:checked="${attributeType?.isGoalKeeper}"
                  />
                  <label class="form-check-label" for="isGoalKeeper">
                    Chỉ số dành cho thủ môn
                    <small class="text-muted">(Chỉ số này chỉ áp dụng cho cầu thủ ở vị trí thủ môn)</small>
                  </label>
                </div>
              </div>

              <div class="card-footer">
                <button type="submit" class="btn btn-primary">
                  <i class="fas fa-save"></i> Lưu
                </button>
                <a th:href="@{/admin/attribute-types}" class="btn btn-secondary">
                  <i class="fas fa-times"></i> Hủy
                </a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
